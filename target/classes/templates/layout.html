<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle != null ? pageTitle + ' | SageFolio' : 'SageFolio'}">SageFolio</title>
  <meta name="description" content="SageFolio – Smart Decisions for New Investors. AI-powered stock insights for Indian markets." />
  <!-- Bootstrap 5 loaded FIRST so our custom CSS can override it -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Custom CSS loaded LAST -->
  <link rel="stylesheet" th:href="@{/css/style.css(v=2)}" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="sf-nav">
  <div class="sf-nav-left">
    <a href="/" class="sf-logo">🌿 Sage<span>Folio</span></a>
    <span class="sf-tagline">Smart Decisions for New Investors</span>
  </div>
  <div class="sf-nav-links">
    <a href="/"               class="sf-nav-link" th:classappend="${currentPage == 'home'   ? ' active' : ''}">Home</a>
    <!-- Add "Dashboard" after the "Home" link -->
    <a href="/dashboard" class="sf-nav-link"
       th:classappend="${currentPage == 'dashboard'} ? 'active'">
      Dashboard
    </a>
    <a href="/risk-profile"   class="sf-nav-link" th:classappend="${currentPage == 'risk'   ? ' active' : ''}">Risk Profile</a>
    <a href="/stock-analysis" class="sf-nav-link" th:classappend="${currentPage == 'stocks' ? ' active' : ''}">Stock Analysis</a>
    <button id="themeToggle" class="sf-btn-outline" style="border:none;padding:6px;font-size:16px;" title="Toggle Dark/Light Mode">🌓</button>
    <!-- Add "Dev Docs" at the end, desktop only -->
    <a href="/dev-docs" class="sf-nav-link d-none d-md-inline"
       th:classappend="${currentPage == 'dev-docs'} ? 'active'">
      🛠️ Dev Docs
    </a>
  </div>
</nav>

<!-- Page-specific content injected here -->
<div th:replace="${content}"><!-- placeholder --></div>

<footer class="sf-footer">
  <p>🌿 SageFolio &copy; 2026 &nbsp;·&nbsp; Educational tool only &nbsp;·&nbsp; Not financial advice &nbsp;·&nbsp; Alpha Vantage Integration</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Simple dark/light mode toggle
  const toggleBtn = document.getElementById('themeToggle');
  const body = document.body;
  
  if (localStorage.getItem('theme') === 'light') {
    body.classList.add('light-mode');
  }
  
  toggleBtn.addEventListener('click', () => {
    body.classList.toggle('light-mode');
    if(body.classList.contains('light-mode')) {
      localStorage.setItem('theme', 'light');
    } else {
      localStorage.setItem('theme', 'dark');
    }
    
    // Dispatch event to redraw charts with new theme colors if present
    window.dispatchEvent(new Event('themeChanged'));
  });
</script>

</body>
</html>
